<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Daily Ledger — Shashank Tiwari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Refined Vintage Light Theme */
    --bg-app: #F6F4EE;
    --bg-main: #FAF8F2;
    --card-bg: rgba(255, 255, 255, 0.75);
    --border-color: rgba(27, 42, 74, 0.1);
    --border-hover: rgba(27, 42, 74, 0.22);
    --text-primary: #1B2A4A;
    --text-secondary: #5D594F;
    --accent: #B8892B;
    --accent-soft: #F4EAD3;
    --green: #277A4E;
    --green-soft: #DCEFE3;
    --rust: #B83A25;
    --rust-soft: #F9E2DD;
    --shadow: 0 4px 18px rgba(27, 42, 74, 0.04), 0 1px 3px rgba(27, 42, 74, 0.02);
    --shadow-hover: 0 12px 30px rgba(27, 42, 74, 0.08), 0 2px 8px rgba(27, 42, 74, 0.04);
    --radius: 12px;
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --font-heading: 'Outfit', sans-serif;
  }

  [data-theme="dark"] {
    --bg-app: #0B0E14;
    --bg-main: #111520;
    --card-bg: rgba(20, 26, 38, 0.7);
    --border-color: rgba(255, 255, 255, 0.07);
    --border-hover: rgba(255, 255, 255, 0.16);
    --text-primary: #E6EDF8;
    --text-secondary: #8E9BAE;
    --accent: #E5A93C;
    --accent-soft: rgba(229, 169, 60, 0.14);
    --green: #2ECC71;
    --green-soft: rgba(46, 204, 113, 0.14);
    --rust: #E74C3C;
    --rust-soft: rgba(231, 76, 60, 0.14);
    --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.4), 0 2px 10px rgba(0, 0, 0, 0.2);
    --shadow-hover: 0 16px 36px -8px rgba(0, 0, 0, 0.5), 0 4px 14px rgba(0, 0, 0, 0.3);
  }

  [data-theme="cyberpunk"] {
    --bg-app: #06080F;
    --bg-main: #0D0F1A;
    --card-bg: rgba(15, 18, 35, 0.8);
    --border-color: rgba(255, 0, 200, 0.15);
    --border-hover: rgba(255, 0, 200, 0.4);
    --text-primary: #F0E6FF;
    --text-secondary: #9B7FCC;
    --accent: #FF00C8;
    --accent-soft: rgba(255, 0, 200, 0.12);
    --green: #00FFAA;
    --green-soft: rgba(0, 255, 170, 0.12);
    --rust: #FF3864;
    --rust-soft: rgba(255, 56, 100, 0.12);
    --shadow: 0 0 20px rgba(255, 0, 200, 0.1), 0 10px 30px rgba(0,0,0,0.5);
    --shadow-hover: 0 0 30px rgba(255, 0, 200, 0.2), 0 16px 40px rgba(0,0,0,0.6);
  }

  [data-theme="forest"] {
    --bg-app: #060D08;
    --bg-main: #0A1410;
    --card-bg: rgba(10, 22, 14, 0.85);
    --border-color: rgba(0, 255, 65, 0.1);
    --border-hover: rgba(0, 255, 65, 0.3);
    --text-primary: #B8FFCA;
    --text-secondary: #5D9970;
    --accent: #00FF41;
    --accent-soft: rgba(0, 255, 65, 0.1);
    --green: #00FF41;
    --green-soft: rgba(0, 255, 65, 0.12);
    --rust: #FF4040;
    --rust-soft: rgba(255, 64, 64, 0.12);
    --shadow: 0 0 20px rgba(0, 255, 65, 0.08), 0 10px 30px rgba(0,0,0,0.6);
    --shadow-hover: 0 0 30px rgba(0, 255, 65, 0.15), 0 16px 40px rgba(0,0,0,0.7);
  }

  [data-theme="sunset"] {
    --bg-app: #0F0808;
    --bg-main: #180E0A;
    --card-bg: rgba(28, 14, 8, 0.8);
    --border-color: rgba(255, 140, 50, 0.15);
    --border-hover: rgba(255, 140, 50, 0.35);
    --text-primary: #FFE8D0;
    --text-secondary: #B8835A;
    --accent: #FF8C32;
    --accent-soft: rgba(255, 140, 50, 0.14);
    --green: #FFD700;
    --green-soft: rgba(255, 215, 0, 0.12);
    --rust: #FF4444;
    --rust-soft: rgba(255, 68, 68, 0.12);
    --shadow: 0 0 20px rgba(255, 100, 30, 0.1), 0 10px 30px rgba(0,0,0,0.5);
    --shadow-hover: 0 0 30px rgba(255, 100, 30, 0.2), 0 16px 40px rgba(0,0,0,0.6);
  }

  /* Theme glow for special themes */
  [data-theme="cyberpunk"] .card { box-shadow: 0 0 0 1px rgba(255,0,200,0.08), var(--shadow); }
  [data-theme="cyberpunk"] .tab-btn.active { box-shadow: 0 0 12px rgba(255,0,200,0.3); }
  [data-theme="forest"] .card { box-shadow: 0 0 0 1px rgba(0,255,65,0.06), var(--shadow); }
  [data-theme="forest"] .tab-btn.active { box-shadow: 0 0 12px rgba(0,255,65,0.3); }
  [data-theme="sunset"] .card { box-shadow: 0 0 0 1px rgba(255,140,50,0.1), var(--shadow); }
  [data-theme="sunset"] .tab-btn.active { box-shadow: 0 0 12px rgba(255,140,50,0.3); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body {
    background: var(--bg-app);
    color: var(--text-primary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s ease, color 0.3s ease;
    -webkit-text-size-adjust: 100%;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  h1, h2, h3, .display {
    font-family: var(--font-heading);
    font-weight: 700;
    letter-spacing: -0.015em;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  a { color: inherit; text-decoration: none; }
  
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: transparent;
  }
  input, select, textarea { font-family: inherit; }

  #app {
    display: flex;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
    background: var(--bg-main);
    box-shadow: 0 0 40px rgba(0,0,0,0.03);
    transition: background 0.3s ease;
    overflow-x: hidden;
  }

  /* Mobile Header */
  #mobileHeader {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-main);
    position: sticky;
    top: 0;
    z-index: 20;
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  #mobileHeader .brand-mark { display: flex; align-items: center; gap: 10px; }
  #mobileHeader .glyph {
    width: 28px; height: 28px; border: 1.5px solid var(--text-primary); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading); font-weight: 700; font-size: 13px;
    color: var(--text-primary); background: var(--accent-soft); flex-shrink: 0;
  }
  #mobileHeader .brand-title { font-size: 15px; font-weight: 700; font-family: var(--font-heading); }
  #mobileHeader .streak-chip { font-size: 12px; }

  .mobile-actions { display: flex; align-items: center; gap: 10px; }
  .theme-circle-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--text-primary);
    display: flex; align-items: center; justify-content: center;
    background: var(--card-bg);
    color: var(--text-primary);
    font-size: 12px;
    transition: all 0.2s ease;
  }

  /* Sidebar */
  #sidebar {
    width: 240px;
    flex-shrink: 0;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    border-right: 1px solid var(--border-color);
    background: rgba(0, 0, 0, 0.01);
    transition: border-color 0.3s ease;
  }
  [data-theme="dark"] #sidebar {
    background: rgba(255, 255, 255, 0.01);
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 4px;
  }
  .brand-mark {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark .glyph {
    width: 32px; height: 32px;
    border: 1.5px solid var(--text-primary);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 15px;
    color: var(--text-primary);
    background: var(--accent-soft);
  }
  .brand-title { font-size: 18px; font-weight: 700; font-family: var(--font-heading); }
  .brand-sub { font-size: 11px; color: var(--text-secondary); padding: 0 4px; line-height: 1.5; }

  nav.tabs { display: flex; flex-direction: column; gap: 4px; }
  .tab-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 14px; font-weight: 600;
    color: var(--text-secondary);
    text-align: left;
    position: relative;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tab-btn svg { width: 18px; height: 18px; flex-shrink: 0; transition: transform 0.2s ease; }
  .tab-btn:hover { background: var(--accent-soft); color: var(--text-primary); }
  .tab-btn:hover svg { transform: scale(1.1); }
  .tab-btn.active { background: var(--text-primary); color: var(--bg-main); }
  .tab-btn.active::before {
    content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 16px; background: var(--accent); border-radius: 2px;
  }
  .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .theme-toggle-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border-color);
    background: var(--card-bg); color: var(--text-primary);
    font-size: 12.5px; font-weight: 600;
    transition: all 0.2s ease;
  }
  .theme-toggle-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .sidebar-footer {
    margin-top: auto;
    font-size: 11px;
    color: var(--text-secondary);
    padding: 0 4px;
    line-height: 1.6;
    border-top: 1px solid var(--border-color);
    padding-top: 16px;
  }
  .streak-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    font-weight: 700;
  }

  /* Main Content Area */
  #main {
    flex: 1;
    padding: 40px 40px 60px 40px;
    min-width: 0;
    position: relative;
  }
  .page-anim { animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .page-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-head h1 { font-size: 28px; margin: 0 0 6px; }
  .page-head .sub { color: var(--text-secondary); font-size: 14px; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
    border-color: var(--border-hover);
  }
  .grid { display: grid; gap: 20px; }
  .grid-2 { grid-template-columns: 1.3fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 1000px) { .grid-3 { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  @media (max-width: 640px) { .grid-3:not(.stats-row) { grid-template-columns: 1fr; } .grid-3.stats-row { grid-template-columns: repeat(3, 1fr); } }

  .card h2 { font-size: 17px; margin: 0 0 16px; display: flex; align-items: center; justify-content: space-between; }
  .card h2 .hint { font-size: 12px; font-weight: 500; color: var(--text-secondary); font-family: var(--font-sans); }

  /* Date / Month Nav */
  .date-nav { display: flex; align-items: center; gap: 8px; }
  .date-nav button {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border-color); background: var(--card-bg);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-primary);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .date-nav button:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--text-primary); transform: scale(1.08); }
  .date-nav button:active { transform: scale(0.92); }
  .date-label { font-family: var(--font-heading); font-weight: 600; font-size: 16px; min-width: 0; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .today-btn {
    font-size: 11px; padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--text-primary); background: transparent; color: var(--text-primary); font-weight: 700;
  }
  .today-btn:hover { background: var(--text-primary); color: var(--bg-main); }

  /* Habits list rows */
  .habit-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 6px;
    border-bottom: 1px dashed var(--border-color);
  }
  .habit-row:last-child { border-bottom: none; }
  .tick {
    width: 24px; height: 24px; border-radius: 7px;
    border: 2px solid var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--bg-main);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .tick.on { background: var(--green); border-color: var(--green); color: #FFF; transform: scale(1.1); }
  .tick svg { width: 14px; height: 14px; }
  .tick:hover { border-color: var(--accent); background: var(--accent-soft); }
  .tick:active { transform: scale(0.9); }
  .habit-name { flex: 1; font-size: 14px; font-weight: 500; }
  .habit-remove {
    background: none; border: none; color: var(--text-secondary); opacity: 0.4; font-size: 15px; padding: 2px 6px;
    transition: all 0.2s ease;
  }
  .habit-remove:hover { opacity: 1; color: var(--rust); transform: scale(1.1); }

  .add-habit-row { display: flex; gap: 8px; margin-top: 14px; }
  .add-habit-row input { flex: 1; }

  input[type=text], input[type=number], select, textarea {
    padding: 10px 12px;
    border: 1.5px solid var(--border-color);
    border-radius: 8px;
    background: var(--bg-main);
    color: var(--text-primary);
    font-size: 13.5px;
    transition: all 0.2s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { width: 100%; resize: vertical; min-height: 72px; }

  .btn {
    padding: 10px 18px; border-radius: 8px; border: 1.5px solid var(--text-primary);
    background: var(--text-primary); color: var(--bg-main); font-size: 13px; font-weight: 700;
    transition: background 0.2s ease, transform 0.1s ease, border-color 0.2s ease, color 0.2s ease;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #FFF; }
  .btn:active { transform: scale(0.96); }
  .btn.ghost { background: transparent; color: var(--text-primary); border-color: var(--border-color); }
  .btn.ghost:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--text-primary); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .mood-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .mood-opt {
    padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border-color);
    background: var(--bg-main); font-size: 12.5px; color: var(--text-secondary);
    transition: all 0.2s ease;
  }
  .mood-opt:hover { border-color: var(--accent); color: var(--text-primary); transform: translateY(-1px); }
  .mood-opt.sel { background: var(--accent); border-color: var(--accent); color: #FFF; font-weight: 700; }
  .mood-opt:active { transform: scale(0.94); }

  /* Ring visualization */
  .ring-wrap { display: flex; align-items: center; gap: 20px; }
  .ring-num { font-family: var(--font-heading); font-size: 28px; font-weight: 700; }
  .ring-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .net-amount { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; }
  .net-amount.pos { color: var(--green); }
  .net-amount.neg { color: var(--rust); }

  /* Transactions list */
  .tx-form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .tx-form select, .tx-form input { flex: 1; min-width: 100px; }
  .type-toggle { display: flex; border: 1.5px solid var(--border-color); border-radius: 8px; overflow: hidden; }
  .type-toggle button { padding: 9px 14px; border: none; background: var(--bg-main); font-size: 12.5px; color: var(--text-secondary); font-weight: 700; transition: all 0.2s ease; }
  .type-toggle button.sel.income { background: var(--green-soft); color: var(--green); }
  .type-toggle button.sel.expense { background: var(--rust-soft); color: var(--rust); }

  .tx-list { display: flex; flex-direction: column; }
  .tx-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 4px; border-bottom: 1px dashed var(--border-color);
    font-size: 13.5px;
  }
  .tx-item:last-child { border-bottom: none; }
  .tx-cat { font-weight: 700; }
  .tx-note { color: var(--text-secondary); font-size: 12.5px; flex: 1; }
  .tx-amt { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
  .tx-amt.income { color: var(--green); }
  .tx-amt.expense { color: var(--rust); }
  .tx-del { background: none; border: none; color: var(--text-secondary); opacity: 0.4; transition: all 0.2s ease; }
  .tx-del:hover { opacity: 1; color: var(--rust); transform: scale(1.1); }
  .empty-note { color: var(--text-secondary); font-size: 13px; font-style: italic; padding: 12px 4px; }

  .stat-card { text-align: left; }
  .stat-card .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 6px; }
  .stat-card .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 600; }

  .cat-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 13px; }
  .cat-bar-name { width: 120px; flex-shrink: 0; color: var(--text-secondary); font-weight: 500; }
  .cat-bar-track { flex: 1; height: 8px; background: rgba(0,0,0,0.05); border-radius: 6px; overflow: hidden; }
  [data-theme="dark"] .cat-bar-track { background: rgba(255,255,255,0.05); }
  .cat-bar-fill { height: 100%; background: var(--accent); border-radius: 6px; }
  .cat-bar-amt { width: 90px; text-align: right; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }

  /* Ledger Book */
  .ledger-book { border: 1.5px solid var(--border-color); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .ledger-book-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .ledger-table { min-width: 400px; }
  .ledger-header-row, .ledger-row {
    display: grid; grid-template-columns: 110px 1fr 90px 110px;
    gap: 12px; padding: 12px 18px; align-items: center;
    border-bottom: 1px solid var(--border-color);
  }
  .ledger-header-row { background: var(--accent-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-primary); font-weight: 700; }
  .ledger-row { background: var(--card-bg); font-size: 13.5px; transition: all 0.2s ease; cursor: pointer; }
  .ledger-row:hover { background: var(--accent-soft); transform: scale(1.005); }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-date { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; white-space: nowrap; }
  .ledger-dots { display: flex; gap: 5px; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-color); transition: background 0.2s ease; }
  .dot.on { background: var(--green); }
  .ledger-net { font-family: 'IBM Plex Mono', monospace; text-align: right; font-weight: 600; white-space: nowrap; }

  .chart-wrap { overflow-x: auto; margin-top: 14px; -webkit-overflow-scrolling: touch; }
  .chart-wrap svg { display: block; width: 100%; height: auto; max-width: 100%; }

  .empty-state {
    text-align: center; padding: 48px 24px; color: var(--text-secondary);
  }
  .empty-state .glyph-lg { font-size: 36px; margin-bottom: 12px; }  /* ===== RESPONSIVE BREAKPOINTS ===== */

  /* Tablet/small laptop: 760px – 1024px */
  @media (max-width: 1024px) {
    #app { max-width: 100%; }
    #sidebar { width: 200px; padding: 22px 14px; gap: 20px; }

<script>
(function(){
  "use strict";

  function safeParse(val, fallback){
    if(!val) return fallback;
    if(typeof val !== 'string') return val;
    try{
      return JSON.parse(val);
    } catch(e) {
      console.error('JSON parse error for value:', val, e);
      return fallback;
    }
  }

  /* ---------- storage helpers ---------- */
  async function sGet(key, shared=false){
    try{
      if (window.storage && typeof window.storage.get === 'function') {
        const r = await window.storage.get(key, shared);
        return r ? r.value : null;
      }
    } catch(e) {}
    try {
      const res = await fetch(`/api/storage?key=${encodeURIComponent(key)}`);
      if (!res.ok) return null;
      const data = await res.json();
      return data.value;
    } catch(e) { return null; }
  }
  async function sSet(key, value, shared=false){
    try{
      if (window.storage && typeof window.storage.set === 'function') {
        await window.storage.set(key, value, shared);
        return true;
      }
    } catch(e) {}
    try {
      const res = await fetch('/api/storage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, value })
      });
      return res.ok;
    } catch(e) { console.error('storage set failed', e); return false; }
  }
  async function sList(prefix, shared=false){
    try{
      if (window.storage && typeof window.storage.list === 'function') {
        const r = await window.storage.list(prefix, shared);
        return r ? r.keys : [];
      }
    } catch(e) {}
    try {
      const res = await fetch(`/api/storage/list?prefix=${encodeURIComponent(prefix)}`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.keys || [];
    } catch(e) { return []; }
  }
  async function sBulkGet(prefix, shared=false){
    try{
      if (window.storage && typeof window.storage.list === 'function' && typeof window.storage.get === 'function') {
        const keys = await sList(prefix, shared);
        const promises = keys.map(async k => {
          const r = await window.storage.get(k, shared);
          return { key: k, value: r ? r.value : null };
        });
        const results = await Promise.all(promises);
        const data = {};
        results.forEach(r => {
          if (r.value !== null) data[r.key] = r.value;
        });
        return data;
      }
    } catch(e) {}
    try {
      const res = await fetch(`/api/storage/bulk?prefix=${encodeURIComponent(prefix)}`);
      if (!res.ok) throw new Error('Bulk fetch failed');
      const data = await res.json();
      return data.data || {};
    } catch(e) {
      const keys = await sList(prefix, shared);
      const data = {};
      await Promise.all(keys.map(async k => {
        const val = await sGet(k, shared);
        if(val !== null) data[k] = val;
      }));
      return data;
    }
  }

  /* ---------- constants ---------- */
  const DEFAULT_HABITS = ["Wake up before 7 AM","Exercise / workout","Read 20 minutes","Study or build a skill","Eat clean, no junk","Meditate 10 minutes","No phone 30 min before bed"];
  const EXPENSE_CATS = ["Food","Transport","Education","Entertainment","Subscriptions","Savings / Investment","Other"];
  const INCOME_CATS = ["Allowance","Freelance","Salary","Gift","Other"];
  const MOODS = ["Low","Okay","Good","Great","On fire"];

  const todayStr = () => new Date().toLocaleDateString('sv-SE');
  const fmtINR = n => '₹' + Number(n||0).toLocaleString('en-IN');
  const fmtDateLong = ds => {
    const d = new Date(ds+'T00:00:00');
    return d.toLocaleDateString('en-IN', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  };
  const addDays = (ds, n) => {
    const d = new Date(ds+'T00:00:00');
    d.setDate(d.getDate()+n);
    return d.toLocaleDateString('sv-SE');
  };
  const monthLabel = ym => {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString('en-IN', { month:'long', year:'numeric' });
  };
  const shiftMonth = (ym, n) => {
    const [y,m] = ym.split('-').map(Number);
    const d = new Date(y, m-1+n, 1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  };
  const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

  function emptyDay(){ return { habits:{}, mood:null, note:'', transactions:[] }; }
  function isDayActive(day){
    if(!day) return false;
    if(Object.values(day.habits||{}).some(Boolean)) return true;
    if(day.transactions && day.transactions.length) return true;
    if(day.note && day.note.trim()) return true;
    return false;
  }
  function dayNet(day){
    if(!day || !day.transactions) return 0;
    return day.transactions.reduce((s,t)=> s + (t.type==='income'? t.amount : -t.amount), 0);
  }

  /* ---------- theme store config ---------- */
  const THEMES = [
    { id: 'light',    label: 'Vintage Cream',    dot: '#B8892B', req: 0 },
    { id: 'dark',     label: 'Midnight Obsidian', dot: '#E5A93C', req: 0 },
    { id: 'cyberpunk',label: 'Cyberpunk Neon',   dot: '#FF00C8', req: 3 },
    { id: 'forest',   label: 'Forest Matrix',    dot: '#00FF41', req: 5 },
    { id: 'sunset',   label: 'Sunset Gold',      dot: '#FF8C32', req: 7 },
  ];

  /* ---------- state ---------- */
  const state = {
    tab: 'today',
    selectedDate: todayStr(),
    habits: [],
    dayCache: {},
    allDaysMap: {},
    allDaysLoaded: false,
    financeMonth: todayStr().slice(0,7),
    txType: 'expense',
    showHabitEditor: false,
    challenges: [],
  };

  async function loadDay(ds){
    if(state.dayCache[ds]) return state.dayCache[ds];
    const raw = await sGet('day:'+ds);
    const data = safeParse(raw, emptyDay());
    state.dayCache[ds] = data;
    return data;
  }
  async function persistDay(ds){
    await sSet('day:'+ds, JSON.stringify(state.dayCache[ds]));
    state.allDaysMap[ds] = state.dayCache[ds];
  }
  async function loadAllDays(){
    const data = await sBulkGet('day:');
    const map = {};
    for(const k in data){
      const raw = data[k];
      if(raw){
        map[k.slice(4)] = safeParse(raw, emptyDay());
      }
    }
    state.allDaysMap = Object.assign(map, state.allDaysMap);
    state.allDaysLoaded = true;
  }

  /* ---------- icons ---------- */
  const ICONS = {
    today: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/><path d="M8 14l2 2 4-4" /></svg>',
    finance: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.2c0-1.2 1.1-2.2 2.5-2.2s2.5 1 2.5 2c0 2.5-5 1.7-5 4.2 0 1.1 1.1 2 2.5 2s2.5-.9 2.5-2"/></svg>',
    history: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="17" rx="1.5"/><path d="M4 9h16M9 4v-1M15 4v-1"/><path d="M8 13h3M8 17h6"/></svg>',
    insights: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M11 20V4M18 20v-7"/></svg>',
    chevL: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>',
    chevR: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg>',
  };

  /* ---------- render root ---------- */
  function renderNav(){
    const tabsEl = document.getElementById('tabs');
    const items = [
      {id:'today', label:'Today', icon:ICONS.today},
      {id:'finance', label:'Finance', icon:ICONS.finance},
      {id:'history', label:'History', icon:ICONS.history},
      {id:'insights', label:'Insights', icon:ICONS.insights},
    ];
    tabsEl.innerHTML = items.map(it => `
      <button class="tab-btn ${state.tab===it.id?'active':''}" data-tab="${it.id}">${it.icon}<span>${it.label}</span></button>
    `).join('');

  /* ---------- INSIGHTS TAB ---------- */
  function renderInsights(){
    const dates = Object.keys(state.allDaysMap);
    const activeDates = dates.filter(d=>isDayActive(state.allDaysMap[d]));
    const totalDays = activeDates.length;
    const streak = computeStreak();
    const best = computeBestStreak();

    let allExpense=0, allIncome=0, totalTicks=0, possibleTicks=0;
    dates.forEach(ds=>{
      const day = state.allDaysMap[ds];
      (day.transactions||[]).forEach(t=>{ if(t.type==='income') allIncome+=t.amount; else allExpense+=t.amount; });
      totalTicks += Object.values(day.habits||{}).filter(Boolean).length;
      possibleTicks += state.habits.length;
    });
    const completionRate = possibleTicks ? Math.round((totalTicks/possibleTicks)*100) : 0;

    const last14 = [];
    for(let i=13;i>=0;i--){ last14.push(addDays(todayStr(), -i)); }
    const nets = last14.map(ds=> dayNet(state.allDaysMap[ds]||emptyDay()));
    const maxAbs = Math.max(1, ...nets.map(n=>Math.abs(n)));
    const barW = 26, gap=8, chartH=110;
    const bars = nets.map((n,i)=>{
      const h = Math.max(2, (Math.abs(n)/maxAbs)*(chartH/2-6));
      const x = i*(barW+gap);
      const isPos = n>=0;
      const y = isPos ? (chartH/2 - h) : chartH/2;
      return `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="${isPos?'var(--green)':'var(--rust)'}"/>
              <text x="${x+barW/2}" y="${chartH+14}" font-size="9" fill="var(--ink-soft)" text-anchor="middle" font-family="IBM Plex Mono">${last14[i].slice(8)}</text>`;

    const chartWidth = last14.length*(barW+gap);

    const heatmapHtml = renderHeatmap();

    return `

        <div class="card stat-card"><div class="stat-label">All-time spent</div><div class="stat-value" style="color:var(--rust)">${fmtINR(allExpense)}</div></div>
      </div>

      <div class="card" style="margin-top:18px;">
        <h2>🟩 30-Day Habit Heatmap</h2>
        ${heatmapHtml}
        <div style="display:flex; gap:8px; align-items:center; margin-top:12px; font-size:11px; color:var(--text-secondary);">
          <span>Less</span>
          <div style="display:flex; gap:3px;">
            ${[0,25,50,75,100].map(p => `<div style="width:12px;height:12px;border-radius:3px;background:${heatColor(p)}"></div>`).join('')}
          </div>
          <span>More</span>
        </div>
      </div>

      <div class="card" style="margin-top:18px;">
        <h2>Last 14 days — net amount</h2>
        <div class="chart-wrap">
          <svg width="${chartWidth}" height="${chartH+24}" viewBox="0 0 ${chartWidth} ${chartH+24}">
            <line x1="0" y1="${chartH/2}" x2="${chartWidth}" y2="${chartH/2}" stroke="var(--border-color)" stroke-width="1"/>
            ${bars}
          </svg>
        </div>
      </div>
    `;
  }

  /* ---------- HEATMAP ---------- */
  function heatColor(pct){
    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    const isDarkish = ['dark','cyberpunk','forest','sunset'].includes(theme);
    if(pct === 0) return isDarkish ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.07)';
    if(pct <= 25) return theme==='cyberpunk'?'rgba(255,0,200,0.25)': theme==='forest'?'rgba(0,255,65,0.2)': theme==='sunset'?'rgba(255,140,50,0.25)':'rgba(46,204,113,0.25)';
    if(pct <= 50) return theme==='cyberpunk'?'rgba(255,0,200,0.45)': theme==='forest'?'rgba(0,255,65,0.4)': theme==='sunset'?'rgba(255,140,50,0.45)':'rgba(46,204,113,0.5)';
    if(pct <= 75) return theme==='cyberpunk'?'rgba(255,0,200,0.7)': theme==='forest'?'rgba(0,255,65,0.65)': theme==='sunset'?'rgba(255,140,50,0.7)':'rgba(46,204,113,0.75)';
    return theme==='cyberpunk'?'#FF00C8': theme==='forest'?'#00FF41': theme==='sunset'?'#FF8C32':'#27AE60';
  }

  function renderHeatmap(){
    const cells = [];
    for(let i=29; i>=0; i--){
      const ds = addDays(todayStr(), -i);
      const day = state.allDaysMap[ds] || state.dayCache[ds];
      let pct = 0;
      if(day && state.habits.length){
        const done = state.habits.filter(h => day.habits && day.habits[h]).length;
        pct = Math.round((done / state.habits.length) * 100);
      }
      const color = heatColor(pct);
      cells.push(`<div class="heatmap-cell" style="background:${color};"><span class="heatmap-tip">${ds}: ${pct}%</span></div>`);
    }
    return `<div class="heatmap-grid">${cells.join('')}</div>`;
  }

  function computeStreak(){
    let streak = 0;
    let d = todayStr();
    while(true){
      const day = state.allDaysMap[d] || state.dayCache[d];
      if(day && isDayActive(day)){ streak++; d = addDays(d,-1); }
      else break;
    }
    return streak;
  }
  function computeBestStreak(){
    const dates = Object.keys(state.allDaysMap).filter(d=>isDayActive(state.allDaysMap[d])).sort();
    let best=0, run=0, prev=null;
    dates.forEach(ds=>{
      if(prev && addDays(prev,1)===ds){ run++; } else { run=1; }
      best = Math.max(best, run);
      prev = ds;
    });
    return best;
  }

  /* ---------- events ---------- */
  function bindTabEvents(){
    const main = document.getElementById('main');
    if(!main.dataset.bound){
      main.addEventListener('click', onMainClick);
      main.dataset.bound = '1';
    }
  }

  async function onMainClick(e){
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    const ds = state.selectedDate;

    if(action==='prev-day'){ state.selectedDate = addDays(ds,-1); return render(); }
    if(action==='next-day'){ state.selectedDate = addDays(ds,1); return render(); }
    if(action==='goto-today'){ state.selectedDate = todayStr(); return render(); }

    if(action==='toggle-habit'){
      const h = el.dataset.habit;
      const day = await loadDay(ds);
      day.habits[h] = !day.habits[h];
      await persistDay(ds);
      return render();
    }
    if(action==='toggle-editor'){ state.showHabitEditor = !state.showHabitEditor; return render(); }
    if(action==='add-habit'){
      const input = document.getElementById('newHabitInput');
      const val = input.value.trim();
      if(val && !state.habits.includes(val)){
        state.habits.push(val);
        await sSet('config:habits', JSON.stringify(state.habits));
      }
      return render();
    }
    if(action==='remove-habit'){
      const h = el.dataset.habit;
      state.habits = state.habits.filter(x=>x!==h);
      await sSet('config:habits', JSON.stringify(state.habits));
      return render();
    }
    if(action==='set-mood'){
      const day = await loadDay(ds);
      day.mood = el.dataset.mood;
      await persistDay(ds);
      return render();
    }
    if(action==='save-note'){
      const day = await loadDay(ds);
      day.note = document.getElementById('dayNote').value;
      await persistDay(ds);
      return render();
    }
    if(action==='set-txtype'){ state.txType = el.dataset.type; return render(); }
    if(action==='add-tx'){
      const cat = document.getElementById('txCategory').value;
      const amtRaw = document.getElementById('txAmount').value;
      const note = document.getElementById('txNote').value.trim();
      const amt = Number(amtRaw);
      if(!amt || amt<=0) return;
      const day = await loadDay(ds);
      day.transactions = day.transactions || [];
      day.transactions.push({ id: uid(), type: state.txType, category: cat, amount: amt, note });
      await persistDay(ds);
      return render();
    }
    if(action==='del-tx'){
      const day = await loadDay(ds);
      day.transactions = (day.transactions||[]).filter(t=>t.id!==el.dataset.id);
      await persistDay(ds);
      return render();
    }
    if(action==='prev-month'){ state.financeMonth = shiftMonth(state.financeMonth,-1); return render(); }
    if(action==='next-month'){ state.financeMonth = shiftMonth(state.financeMonth,1); return render(); }
    if(action==='open-day'){
      state.selectedDate = el.dataset.date;
      state.tab = 'today';
      return render();
    }

    /* --- challenge events --- */
    if(action==='challenge-tick'){
      const idx = Number(el.dataset.idx);
      const ch = state.challenges[idx];
      if(!ch) return;
      ch.completedDates = ch.completedDates || [];
      if(!ch.completedDates.includes(ds)) ch.completedDates.push(ds);
      await sSet('config:challenges', JSON.stringify(state.challenges));
      return render();
    }
    if(action==='challenge-del'){
      const idx = Number(el.dataset.idx);
      state.challenges.splice(idx, 1);
      await sSet('config:challenges', JSON.stringify(state.challenges));
      return render();
    }
    if(action==='add-challenge'){
      const sel = document.getElementById('challengeTemplate');
      const customName = document.getElementById('challengeCustomName');
      const customDays = document.getElementById('challengeCustomDays');
      let name, days;
      if(sel && sel.value === 'custom'){
        name = customName ? customName.value.trim() : '';
        days = customDays ? Number(customDays.value) : 7;
        if(!name) return;
      } else {
        const tpl = CHALLENGE_TEMPLATES.find(t => t.name === sel.value);
        if(!tpl) return;
        name = tpl.name;
        days = tpl.days;
      }
      if(!days || days < 1) return;
      state.challenges.push({ id: uid(), name, days, completedDates: [], startDate: ds });
      await sSet('config:challenges', JSON.stringify(state.challenges));
      return render();
    }
  }

  /* ---------- challenge template switcher (show/hide custom inputs) ---------- */
  function bindChallengeFormEvents(){
    const sel = document.getElementById('challengeTemplate');
    const nameInput = document.getElementById('challengeCustomName');
    const daysInput = document.getElementById('challengeCustomDays');
    if(sel && nameInput && daysInput){
      sel.addEventListener('change', () => {
        const isCustom = sel.value === 'custom';
        nameInput.style.display = isCustom ? '' : 'none';
        daysInput.style.display = isCustom ? '' : 'none';
      });
    }
  }

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function escapeAttr(s){ return escapeHtml(s); }

  /* ---------- THEME STORE POPUP ---------- */
  function openThemePopup(){
    document.getElementById('themePopupBackdrop').classList.add('open');
  }
  function closeThemePopup(){
    document.getElementById('themePopupBackdrop').classList.remove('open');
  }

  function renderThemeStore(){
    const streak = computeStreak();
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const listEl = document.getElementById('themeStoreList');
    if(!listEl) return;
    listEl.innerHTML = THEMES.map(t => {
      const unlocked = streak >= t.req;
      const isActive = current === t.id;
      return `
        <div class="theme-swatch ${isActive?'active':''} ${!unlocked?'locked':''}" data-theme-id="${t.id}" style="cursor:${unlocked?'pointer':'not-allowed'}">
          <div class="swatch-dot" style="background:${t.dot};"></div>
          <span class="swatch-label">${t.label}</span>
          ${isActive ? '<span class="swatch-badge">Active</span>' : ''}
          ${!unlocked ? `<span class="swatch-badge">🔒 ${t.req}d streak</span>` : ''}
        </div>
      `;
    }).join('');
    listEl.querySelectorAll('.theme-swatch:not(.locked)').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.themeId;
        document.documentElement.setAttribute('data-theme', id);
        localStorage.setItem('theme', id);
        const mobileBtn = document.getElementById('mobileThemeToggle');
        if(mobileBtn) mobileBtn.textContent = ['light'].includes(id) ? '🌙' : '☀️';
        renderThemeStore();
      });
    });

    // sidebar trigger
    const triggerBtn = document.getElementById('themeStoreToggle');
    if(triggerBtn) triggerBtn.onclick = openThemePopup;

    // popup close
    document.getElementById('themePopupClose').onclick = closeThemePopup;
    document.getElementById('themePopupBackdrop').onclick = (e) => {
      if(e.target === e.currentTarget) closeThemePopup();
    };

    // mobile button opens popup instead of cycling
    const mobileBtn = document.getElementById('mobileThemeToggle');
    if(mobileBtn){
      mobileBtn.onclick = openThemePopup;
    }

    // ESC key closes popup
    document.onkeydown = (e) => {
      if(e.key === 'Escape') closeThemePopup();
    };
  }

  /* ---------- init ---------- */
  async function init(){
    const [rawHabits, rawChallenges] = await Promise.all([
      sGet('config:habits'),
      sGet('config:challenges'),
    ]);
    state.habits = safeParse(rawHabits, DEFAULT_HABITS.slice());
    state.challenges = safeParse(rawChallenges, []);
    await loadDay(state.selectedDate);
    render();
    renderThemeStore();
  }
  init();
})();
</script>
